AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Mootive backend for the One With AI hackathon

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 15
    MemorySize: 256
    Environment:
      Variables:
        USERS_TABLE: !Ref UsersTable
        DELIVERIES_TABLE: !Ref DeliveriesTable
        RIDERS_TABLE: !Ref RidersTable
        TICKETS_TABLE: !Ref TicketsTable
    Tags:
      aws-apn-id: pc:8l8gcn23lmlgammd8572tk6va
      event: oneWithAI

Resources:
  MootiveApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowHeaders:
          - Content-Type
        AllowMethods:
          - GET
          - POST
          - PATCH
          - OPTIONS
      Tags:
        aws-apn-id: pc:8l8gcn23lmlgammd8572tk6va
        event: oneWithAI

  MootiveFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mootive-api
      CodeUri: .
      Handler: src/app.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref DeliveriesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RidersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref TicketsTable
      Events:
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref MootiveApi
            Path: /health
            Method: GET
        CreateUser:
          Type: HttpApi
          Properties:
            ApiId: !Ref MootiveApi
            Path: /users
            Method: POST
        ListUsers:
          Type: HttpApi
          Properties:
            ApiId: !Ref MootiveApi
            Path: /users
            Method: GET
        GetUser:
          Type: HttpApi
          Properties:
            ApiId: !Ref MootiveApi
            Path: /users/{tag}
            Method: GET
        IncomingDeliveries:
          Type: HttpApi
          Properties:
            ApiId: !Ref MootiveApi
            Path: /users/{tag}/incoming
            Method: GET
        CreateDelivery:
          Type: HttpApi
          Properties:
            ApiId: !Ref MootiveApi
            Path: /deliveries
            Method: POST
        ListDeliveries:
          Type: HttpApi
          Properties:
            ApiId: !Ref MootiveApi
            Path: /deliveries
            Method: GET
        GetDelivery:
          Type: HttpApi
          Properties:
            ApiId: !Ref MootiveApi
            Path: /deliveries/{deliveryId}
            Method: GET
        ListRiders:
          Type: HttpApi
          Properties:
            ApiId: !Ref MootiveApi
            Path: /riders
            Method: GET
        FindRiders:
          Type: HttpApi
          Properties:
            ApiId: !Ref MootiveApi
            Path: /riders/find
            Method: POST
        RecommendRider:
          Type: HttpApi
          Properties:
            ApiId: !Ref MootiveApi
            Path: /recommend-rider
            Method: POST
        SelectRider:
          Type: HttpApi
          Properties:
            ApiId: !Ref MootiveApi
            Path: /deliveries/{deliveryId}/select-rider
            Method: POST
        SimulatePayment:
          Type: HttpApi
          Properties:
            ApiId: !Ref MootiveApi
            Path: /deliveries/{deliveryId}/simulate-payment
            Method: POST
        UpdateStatusPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref MootiveApi
            Path: /deliveries/{deliveryId}/status
            Method: POST
        UpdateStatusPatch:
          Type: HttpApi
          Properties:
            ApiId: !Ref MootiveApi
            Path: /deliveries/{deliveryId}/status
            Method: PATCH
        ConfirmDelivery:
          Type: HttpApi
          Properties:
            ApiId: !Ref MootiveApi
            Path: /deliveries/{deliveryId}/confirm
            Method: POST
        RaiseTicket:
          Type: HttpApi
          Properties:
            ApiId: !Ref MootiveApi
            Path: /deliveries/{deliveryId}/tickets
            Method: POST
        GetTicket:
          Type: HttpApi
          Properties:
            ApiId: !Ref MootiveApi
            Path: /deliveries/{deliveryId}/tickets
            Method: GET

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: MootiveUsers
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      Tags:
        - Key: aws-apn-id
          Value: pc:8l8gcn23lmlgammd8572tk6va
        - Key: event
          Value: oneWithAI

  DeliveriesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: MootiveDeliveries
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: deliveryId
          AttributeType: S
      KeySchema:
        - AttributeName: deliveryId
          KeyType: HASH
      Tags:
        - Key: aws-apn-id
          Value: pc:8l8gcn23lmlgammd8572tk6va
        - Key: event
          Value: oneWithAI

  RidersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: MootiveRiders
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: riderId
          AttributeType: S
      KeySchema:
        - AttributeName: riderId
          KeyType: HASH
      Tags:
        - Key: aws-apn-id
          Value: pc:8l8gcn23lmlgammd8572tk6va
        - Key: event
          Value: oneWithAI

  TicketsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: MootiveTickets
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ticketId
          AttributeType: S
      KeySchema:
        - AttributeName: ticketId
          KeyType: HASH
      Tags:
        - Key: aws-apn-id
          Value: pc:8l8gcn23lmlgammd8572tk6va
        - Key: event
          Value: oneWithAI

Outputs:
  ApiUrl:
    Description: HTTP API endpoint
    Value: !Sub https://${MootiveApi}.execute-api.${AWS::Region}.amazonaws.com
  FunctionName:
    Value: !Ref MootiveFunction
  UsersTableName:
    Value: !Ref UsersTable
  DeliveriesTableName:
    Value: !Ref DeliveriesTable
  RidersTableName:
    Value: !Ref RidersTable
  TicketsTableName:
    Value: !Ref TicketsTable
